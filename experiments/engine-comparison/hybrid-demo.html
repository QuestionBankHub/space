<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hybrid (Three + Cesium) — Space Demo</title>
<style>
  html, body { margin:0; padding:0; background:#000; overflow:hidden; height:100%; color:#eee; font-family:-apple-system,"Segoe UI",sans-serif; }
  .split { display:grid; grid-template-columns: 1fr 1fr; height:100vh; gap:2px; background:#1c2038; }
  .pane { position:relative; background:#000; }
  iframe { width:100%; height:100%; border:0; display:block; }
  .label { position:absolute; top:14px; left:16px; z-index:10; background:rgba(8,10,20,.75); backdrop-filter:blur(8px); border:1px solid #222740; border-radius:10px; padding:8px 12px; font-size:12px; }
  .label .tag { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#7aa6ff; }
  .label.right .tag { color:#ff9f6a; }
  #back { position:fixed; top:14px; right:16px; z-index:100; background:rgba(8,10,20,.75); border:1px solid #222740; padding:8px 12px; border-radius:8px; font-size:12px; color:#7aa6ff; text-decoration:none; }
  #info { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:100; background:rgba(8,10,20,.75); backdrop-filter:blur(8px); border:1px solid #222740; border-radius:10px; padding:10px 16px; font-size:13px; color:#cfd5ec; max-width:560px; text-align:center; }
  @media (max-width: 720px) { .split { grid-template-columns:1fr; grid-template-rows:1fr 1fr; } }
</style>
</head>
<body>
  <a id="back" href="index.html">← back</a>
  <div class="split">
    <div class="pane">
      <div class="label"><div class="tag">Three.js</div><div>Cosmic / orbital view</div></div>
      <iframe src="three-demo.html" title="Three.js demo"></iframe>
    </div>
    <div class="pane">
      <div class="label right"><div class="tag">CesiumJS</div><div>Planet-surface / mission view</div></div>
      <iframe src="cesium-demo.html" title="Cesium demo"></iframe>
    </div>
  </div>
  <div id="info">
    Hybrid: Three.js drives the cinematic "in space" feel, Cesium takes over when a lesson lands you on a real planetary surface or tracks a real satellite. Two engines, one site.
  </div>
</body>
</html>
