<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Three.js — Space Demo</title>
<style>
  html, body { margin:0; padding:0; background:#000; overflow:hidden; height:100%; color:#eee; font-family:-apple-system,"Segoe UI",sans-serif; }
  #info { position:fixed; top:14px; left:16px; z-index:10; background:rgba(8,10,20,.6); backdrop-filter:blur(8px); border:1px solid #222740; border-radius:10px; padding:10px 14px; font-size:13px; }
  #info .tag { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#6dd6a0; }
  a { color:#7aa6ff; text-decoration:none; }
  #back { position:fixed; top:14px; right:16px; z-index:10; background:rgba(8,10,20,.6); border:1px solid #222740; padding:8px 12px; border-radius:8px; font-size:12px; }
</style>
</head>
<body>
  <div id="info"><div class="tag">Three.js</div><div>Drag to orbit · Scroll to zoom</div></div>
  <a id="back" href="index.html">← back</a>
  <canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(2.6, 0.6, 2.6);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.minDistance = 1.5;
controls.maxDistance = 12;

const loader = new THREE.TextureLoader();
const TEX = 'https://threejs.org/examples/textures/planets/';
const dayMap   = loader.load(TEX + 'earth_atmos_2048.jpg');
const normMap  = loader.load(TEX + 'earth_normal_2048.jpg');
const specMap  = loader.load(TEX + 'earth_specular_2048.jpg');
const cloudMap = loader.load(TEX + 'earth_clouds_1024.png');
dayMap.colorSpace = THREE.SRGBColorSpace;

// Earth
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshPhongMaterial({ map: dayMap, normalMap: normMap, specularMap: specMap, shininess: 18, specular: new THREE.Color(0x223344) })
);
scene.add(earth);

// Clouds
const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.005, 96, 96),
  new THREE.MeshLambertMaterial({ map: cloudMap, transparent: true, opacity: 0.55, depthWrite: false })
);
scene.add(clouds);

// Atmospheric rim glow (custom shader)
const atmo = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 96, 96),
  new THREE.ShaderMaterial({
    transparent: true, side: THREE.BackSide, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: { glowColor: { value: new THREE.Color(0x4ea0ff) } },
    vertexShader: `
      varying vec3 vNormal; varying vec3 vViewDir;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vNormal = normalize(normalMatrix * normal);
        vViewDir = normalize(-mv.xyz);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying vec3 vNormal; varying vec3 vViewDir;
      uniform vec3 glowColor;
      void main() {
        float intensity = pow(0.78 - dot(vNormal, vViewDir), 3.2);
        gl_FragColor = vec4(glowColor, 1.0) * intensity;
      }`
  })
);
scene.add(atmo);

// Sun
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(5, 1.2, 3);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x223044, 0.25));

// Star field — distribute on a sphere with magnitude-weighted sizes (mimicking a real catalog distribution)
const starCount = 8000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starColor = new Float32Array(starCount * 3);
const starSize = new Float32Array(starCount);
const tmp = new THREE.Vector3();
for (let i = 0; i < starCount; i++) {
  // uniform on sphere
  const u = Math.random(), v = Math.random();
  const theta = 2 * Math.PI * u;
  const phi = Math.acos(2 * v - 1);
  const r = 400;
  tmp.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
  starPos.set([tmp.x, tmp.y, tmp.z], i * 3);
  // a few bright "main sequence" colors
  const t = Math.random();
  let cr, cg, cb;
  if (t < 0.7)      { cr = 1.00; cg = 0.96; cb = 0.92; }   // white-yellow
  else if (t < 0.9) { cr = 0.75; cg = 0.85; cb = 1.00; }   // blue
  else              { cr = 1.00; cg = 0.78; cb = 0.55; }   // red giant
  starColor.set([cr, cg, cb], i * 3);
  // power-law magnitude distribution (most dim, few bright)
  starSize[i] = Math.pow(Math.random(), 7) * 3.0 + 0.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColor, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSize, 1));

const starMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float size; varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float a = smoothstep(0.5, 0.0, d);
      gl_FragColor = vec4(vColor, a);
    }`,
  vertexColors: true
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.6, 0.0));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  earth.rotation.y += 0.0008;
  clouds.rotation.y += 0.0010;
  controls.update();
  composer.render();
}
animate();
</script>
</body>
</html>
